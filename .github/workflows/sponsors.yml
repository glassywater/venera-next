name: 同步赞助者名单

on:
  schedule:
    # 北京时间每天 00:15，同步延迟不会影响应用核心功能。
    - cron: "15 16 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "仅生成并检查结果，不提交到 main"
        required: true
        type: boolean
        default: true
      allow_removal:
        description: "允许移除已有公开昵称，仅在人工确认后启用"
        required: true
        type: boolean
        default: false

concurrency:
  group: sponsors
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      AFDIAN_USER_ID: ${{ secrets.AFDIAN_USER_ID }}
      AFDIAN_API_TOKEN: ${{ secrets.AFDIAN_API_TOKEN }}
    steps:
      - name: 检出仓库
        uses: actions/checkout@v5

      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: 检查仓库机密
        run: |
          if [ -z "$AFDIAN_USER_ID" ] || [ -z "$AFDIAN_API_TOKEN" ]; then
            echo "缺少 AFDIAN_USER_ID 或 AFDIAN_API_TOKEN。" >&2
            exit 1
          fi

      - name: 测试赞助同步与生成脚本
        run: python3 -m unittest discover -s .github/scripts/tests -p "test_*.py"

      - name: 从爱发电同步赞助数据
        run: |
          args=()
          if [ "${{ inputs.allow_removal }}" = "true" ]; then
            args+=(--allow-removal)
          fi
          python3 .github/scripts/sync_afdian_sponsors.py "${args[@]}"

      - name: 生成赞助者公开文件
        run: python3 .github/scripts/generate_sponsors.py

      - name: 检查生成结果
        run: python3 .github/scripts/generate_sponsors.py --check

      - name: 生成任务摘要
        run: |
          echo "## 爱发电赞助同步" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          git diff --stat >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: 上传同步预览
        uses: actions/upload-artifact@v5
        with:
          name: sponsor-sync-preview
          path: |
            .github/data/sponsors.json
            sponsors.json
            SPONSORS.md
            README.md

      - name: 提交赞助者公开文件
        if: github.event_name != 'workflow_dispatch' || inputs.dry_run == false
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add .github/data/sponsors.json sponsors.json SPONSORS.md README.md
          if git diff --staged --quiet; then
            echo "赞助者公开文件无变化，跳过提交。"
          else
            git commit -m "chore(sponsors): 同步爱发电赞助者名单"
            git push
          fi
