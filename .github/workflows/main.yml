name: 完整构建
run-name: 完整构建
on:
  workflow_dispatch: {}
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  Release_Metadata:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - name: 校验发布元数据
        run: python3 .github/scripts/validate_release.py

  Build_MacOS:
    runs-on: macos-15
    needs: Release_Metadata
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version-file: pubspec.yaml
          architecture: x64
      - run: sudo xcode-select --switch /Applications/Xcode_16.4.app
      - run: flutter pub get --enforce-lockfile

      - name: 检查 rust-toolchain.toml
        run: rustup show

      # 构建 Flutter macOS 应用
      - name: 构建 Flutter macOS 应用
        run: flutter build macos --release

      # 创建 DMG 文件
      - name: 创建 DMG
        run: |
          mkdir -p dist
          mkdir -p dist/dmg_contents
          cp -R build/macos/Build/Products/Release/VeneraNext.app dist/dmg_contents/
          ln -s /Applications dist/dmg_contents/Applications
          hdiutil create -volname "VeneraNext" -srcfolder dist/dmg_contents -ov -format UDZO "dist/VeneraNext.dmg"

      - name: 将版本号写入文件名
        run: |
          APP_VERSION=$(sed -n 's/^version:[[:space:]]*//p' pubspec.yaml | tr -d '\r\n')
          mkdir -p result
          mv dist/VeneraNext.dmg "result/VeneraNext-$APP_VERSION.dmg"

      # 上传构建产物
      - name: 上传 DMG
        uses: actions/upload-artifact@v5
        with:
          name: macos_build
          path: result/
  Build_IOS:
    runs-on: macos-15
    needs: Release_Metadata
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version-file: pubspec.yaml
          architecture: x64
      - run: sudo xcode-select --switch /Applications/Xcode_16.4.app
      - run: flutter pub get --enforce-lockfile
      - name: 构建 iOS 应用
        run: |
          APP_VERSION=$(sed -n 's/^version:[[:space:]]*//p' pubspec.yaml | tr -d '\r\n')
          IOS_VERSION="${APP_VERSION%%+*}"
          IOS_BUILD="${APP_VERSION#*+}"
          if [ "$IOS_BUILD" = "$APP_VERSION" ]; then
            IOS_BUILD=1
          fi
          IOS_VERSION="${IOS_VERSION%%-*}"
          echo "正在根据 ${APP_VERSION} 构建 iOS 包版本 ${IOS_VERSION}+${IOS_BUILD}"
          cp pubspec.yaml pubspec.yaml.release
          trap 'mv pubspec.yaml.release pubspec.yaml' EXIT
          perl -0pi -e "s/^version:.*/version: ${IOS_VERSION}+${IOS_BUILD}/m" pubspec.yaml
          flutter build ios --release --no-codesign
      - run: |
          mkdir -p build/ios/iphoneos/Payload
          mv build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload
          cd build/ios/iphoneos/
          zip -r VeneraNext-ios.ipa Payload
      - name: 将版本号写入文件名
        run: |
          APP_VERSION=$(sed -n 's/^version:[[:space:]]*//p' pubspec.yaml | tr -d '\r\n')
          mkdir -p result
          mv build/ios/iphoneos/VeneraNext-ios.ipa "result/VeneraNext-ios-$APP_VERSION.ipa"
      - uses: actions/upload-artifact@v5
        with:
          name: ios_build
          path: result/
  Build_Android:
    runs-on: ubuntu-22.04
    needs: Release_Metadata
    steps:
      - uses: actions/checkout@v5
      - run: rm -rf /opt/hostedtoolcache
      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version-file: pubspec.yaml
          architecture: x64
      - name: 解码并安装 Android 证书
        env:
          STORE_FILE: ${{ secrets.ANDROID_KEYSTORE }}
          PROPERTY_FILE: ${{ secrets.ANDROID_KEY_PROPERTIES }}
        run: |
            echo "$STORE_FILE" | base64 --decode > android/keystore.jks
            echo "$PROPERTY_FILE" > android/key.properties
      - uses: actions/setup-java@v5
        with:
          distribution: 'oracle'
          java-version: '17'
      - name: 配置 Gradle 插件仓库
        run: |
          mkdir -p ~/.gradle/init.d
          cat > ~/.gradle/init.d/plugin-repositories.gradle <<'EOF'
          settingsEvaluated { settings ->
              settings.pluginManagement.repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          EOF
      - name: 检查 rust-toolchain.toml
        run: rustup show
      - run: flutter pub get --enforce-lockfile
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v5
        with:
          name: apks
          path: build/app/outputs/apk/release
  Build_Windows:
    runs-on: windows-latest
    needs: Release_Metadata
    steps:
      - uses: actions/checkout@v5
      - name: 安装依赖
        run: | 
          choco install yq -y
          pip install httpx
      - name: 安装 Inno Setup
        run: choco install innosetup --no-progress
      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version-file: pubspec.yaml
          architecture: x64
      - name: 构建 Windows 安装包
        run: |
          flutter pub get --enforce-lockfile
          python windows/build.py
      - name: 校验 Windows 构建产物
        shell: pwsh
        run: |
          $zip = @(Get-ChildItem -Path build/windows -File -Filter 'VeneraNext-*-windows.zip')
          $installer = @(Get-ChildItem -Path build/windows -File -Filter 'VeneraNext-*-windows-installer.exe')
          if ($zip.Count -ne 1) { throw "应当恰好生成一个 Windows zip，实际为 $($zip.Count)。" }
          if ($installer.Count -ne 1) { throw "应当恰好生成一个 Windows 安装包，实际为 $($installer.Count)。" }
          $artifacts = @($zip + $installer)
          $empty = @($artifacts | Where-Object { $_.Length -le 0 })
          if ($empty.Count -gt 0) {
            throw "Windows 构建产物包含空文件：$($empty.Name -join ', ')"
          }
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $expectedRoot = [System.IO.Path]::GetFileNameWithoutExtension($zip[0].Name)
          $archive = [System.IO.Compression.ZipFile]::OpenRead($zip[0].FullName)
          try {
            $badEntries = @($archive.Entries | Where-Object {
              -not $_.FullName.StartsWith("$expectedRoot/") -and $_.FullName -ne "$expectedRoot/"
            })
            if ($badEntries.Count -gt 0) {
              throw "Windows zip 包含 $expectedRoot/ 之外的文件：$($badEntries.FullName -join ', ')"
            }
            $exeEntry = @($archive.Entries | Where-Object { $_.FullName -eq "$expectedRoot/VeneraNext.exe" })
            if ($exeEntry.Count -ne 1) {
              throw "Windows zip 未包含 $expectedRoot/VeneraNext.exe"
            }
          } finally {
            $archive.Dispose()
          }
          $artifacts | Sort-Object Name | ForEach-Object { "$($_.Name) $($_.Length) bytes" }
      - uses: actions/upload-artifact@v5
        with:
          name: windows_build
          path: |
            build/windows/VeneraNext-*-windows.zip
            build/windows/VeneraNext-*-windows-installer.exe
          if-no-files-found: error
  Build_Linux:
    runs-on: ubuntu-22.04
    needs: Release_Metadata
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version-file: pubspec.yaml
          architecture: x64
      - run: |
          flutter pub get --enforce-lockfile
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev webkit2gtk-4.1
          dart pub global activate -s git https://github.com/venera-app/flutter_to_debian.git
      - run: python3 debian/build.py x64
      - name: 构建 Arch 软件包
        run: python3 .github/scripts/build_arch_package.py
      - run: |
          sudo rm -rf build/linux/arch/app.tar.gz
          sudo rm -rf build/linux/arch/pkg
          sudo rm -rf build/linux/arch/src
          sudo rm -rf build/linux/arch/PKGBUILD
          sudo rm -rf build/linux/arch/Dockerfile
          rm -f build/linux/arch/venera-next-debug-*.pkg.tar.zst
      - uses: actions/upload-artifact@v5
        with:
          name: deb_build
          path: build/linux/x64/release/debian
      - uses: actions/upload-artifact@v5
        with:
          name: arch_build
          path: build/linux/arch/
  Build_Linux_ARM64:
    runs-on: ubuntu-22.04-arm
    needs: Release_Metadata
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          channel: 'master'
          flutter-version-file: pubspec.yaml
      - run: |
          flutter pub get --enforce-lockfile
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev webkit2gtk-4.1
          dart pub global activate -s git https://github.com/venera-app/flutter_to_debian.git
      - name: "修补字体"
        run: |
          dart run patch/font.dart
      - run: python3 debian/build.py arm64
      - uses: actions/upload-artifact@v5
        with:
          name: deb_arm64_build
          path: build/linux/x64/release/debian # 这是 flutter_to_debian 的路径问题，对当前构建结果没有影响。

  Release:
    runs-on: ubuntu-22.04
    needs: [Release_Metadata, Build_MacOS, Build_IOS, Build_Android, Build_Windows, Build_Linux, Build_Linux_ARM64]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v5
      - name: 校验发布元数据
        run: python3 .github/scripts/validate_release.py --write-notes release_notes.md
      - uses: actions/download-artifact@v5
        with:
          name: macos_build
          path: outputs
      - uses: actions/download-artifact@v5
        with:
          name: ios_build
          path: outputs
      - uses: actions/download-artifact@v5
        with:
          name: apks
          path: outputs
      - uses: actions/download-artifact@v5
        with:
          name: windows_build
          path: outputs
      - uses: actions/download-artifact@v5
        with:
          name: deb_build
          path: outputs
      - uses: actions/download-artifact@v5
        with:
          name: arch_build
          path: outputs
      - uses: actions/download-artifact@v5
        with:
          name: deb_arm64_build
          path: outputs
      - name: 生成 Winget Manifest
        if: ${{ !contains(github.ref_name, '-') }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          python3 .github/scripts/generate_winget_manifest.py \
            --version "$version" \
            --installer "outputs/VeneraNext-${version}-windows-installer.exe" \
            --release-date "$(date -u +%F)" \
            --output outputs/winget \
            --print-path
      - uses: actions/upload-artifact@v5
        if: ${{ !contains(github.ref_name, '-') }}
        with:
          name: winget_manifest
          path: outputs/winget/manifests
          if-no-files-found: error
      - name: 创建草稿 Release 并上传资产
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          shopt -s nullglob
          files=(
            outputs/*.ipa
            outputs/*.dmg
            outputs/*.apk
            outputs/*.zip
            outputs/*.exe
            outputs/*.deb
            outputs/*.zst
            outputs/*.AppImage
          )
          if (( ${#files[@]} == 0 )); then
            echo "没有找到可发布的构建产物。" >&2
            exit 1
          fi

          args=(
            --title "${GITHUB_REF_NAME}"
            --notes-file release_notes.md
            --draft
          )
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            args+=(--prerelease)
          fi
          gh release create "${GITHUB_REF_NAME}" "${files[@]}" "${args[@]}"
      - name: 发布草稿 Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release edit "${GITHUB_REF_NAME}" --draft=false
      - name: 清理 jsDelivr CDN 缓存
        run: |
          curl -s "https://purge.jsdelivr.net/gh/CyrilPeng/venera-next@main/pubspec.yaml" | jq '.status'
          curl -s "https://purge.jsdelivr.net/gh/CyrilPeng/venera-next@main/CHANGELOG.md" | jq '.status'
